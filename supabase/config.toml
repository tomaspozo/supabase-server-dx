project_id = "server-ax-dx"

[api]
enabled = true
port = 54321
schemas = ["api"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
schema_paths = ["./schemas/_schemas.sql", "./schemas/_extensions.sql", "./schemas/**/*.sql"]

[db.seed]
sql_paths = ["./seed.sql", "./seeds/local-secrets.seed.sql"]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[auth.hook.send_email]
enabled = true
uri = "pg-functions://postgres/public/_hook_send_email"

[auth.hook.before_user_created]
enabled = true
uri = "pg-functions://postgres/public/_hook_before_user_created"

[functions.queue-worker]
enabled = true
verify_jwt = false

[functions.send-email]
enabled = true
verify_jwt = false

[functions.test-package]
enabled = true
verify_jwt = false

[functions.demo-user-profile]
enabled = true
verify_jwt = false

[functions.demo-public-status]
enabled = true
verify_jwt = false

[functions.demo-secret-admin]
enabled = true
verify_jwt = false

[functions.demo-multi-auth]
enabled = true
verify_jwt = false

[functions.demo-context-primitive]
enabled = true
verify_jwt = false
